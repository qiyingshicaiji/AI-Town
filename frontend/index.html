<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Town 赛博小镇</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 顶部导航栏 -->
    <header class="top-bar">
        <div class="top-bar-left">
            <button class="hamburger" id="sidebarToggle">☰</button>
            <h1 class="app-title">🏙 AI-Town 赛博小镇</h1>
        </div>
        <div class="top-bar-center">
            <div class="timeline-selector">
                <select id="timelineSelect"><option value="">加载中...</option></select>
            </div>
            <div class="day-display">📅 第 <span id="currentDay">0</span> 天</div>
            <button id="advanceDayBtn" class="btn btn-sm">⏩ +1天</button>
            <button id="godPanelToggle" class="btn btn-sm btn-god">⚡ 上帝界面</button>
        </div>
        <div class="top-bar-right">
            <span id="connectionStatus" class="status-dot offline"></span>
            <span id="connectionText">连接中...</span>
        </div>
    </header>

    <!-- 主容器 -->
    <div class="main-container">
        <!-- 左侧对话列表 (WeChat风格) -->
        <aside class="conv-sidebar" id="convSidebar">
            <div class="sidebar-header">
                <div class="sidebar-search">
                    <input type="text" id="convSearch" placeholder="🔍 搜索对话..." class="search-input">
                </div>
                <div class="sidebar-actions">
                    <button id="newGroupChatBtn" class="btn btn-sm">👥 新建群聊</button>
                </div>
            </div>
            <div class="conv-list" id="convList">
                <div class="loading-placeholder">加载中...</div>
            </div>
            <div class="sidebar-footer">
                <div class="status-summary">
                    <span>🟢<span id="idleCount">0</span></span>
                    <span>🟡<span id="chattingCount">0</span></span>
                    <span>🔴<span id="busyCount">0</span></span>
                    <span>| ❤️<span id="avgAffinity">0</span></span>
                </div>
            </div>
        </aside>
        <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

        <!-- 右侧聊天区 (单面板，根据选中对话切换) -->
        <section class="chat-area" id="chatArea">
            <div class="chat-panel active" id="chatPanel">
                <div class="chat-header">
                    <div class="chat-header-info">
                        <span id="chatTitle">选择一个对话开始</span>
                        <span id="chatSubtitle" class="chat-subtitle"></span>
                    </div>
                    <div class="chat-header-actions" id="chatHeaderActions"></div>
                </div>
                <div class="chat-messages" id="chatMessages">
                    <div class="welcome-message">
                        <div class="welcome-icon">🏙️</div>
                        <h2>欢迎来到 AI-Town 赛博小镇</h2>
                        <p>点击左侧对话开始聊天</p>
                    </div>
                </div>
                <div class="chat-input-area">
                    <textarea id="chatInput" class="chat-input" placeholder="输入消息... (Enter发送, Shift+Enter换行)" rows="2" disabled></textarea>
                    <button id="sendBtn" class="btn btn-send" disabled>发送</button>
                </div>
            </div>
        </section>

        <!-- 上帝界面抽屉 -->
        <aside class="god-panel collapsed" id="godPanel">
            <div class="god-panel-header">
                <h2>⚡ 上帝界面</h2>
                <button id="godPanelClose" class="btn btn-sm">✕</button>
            </div>
            <div class="god-section">
                <h3>时间线管理</h3>
                <div class="timeline-list">
                    <table class="timeline-table"><thead><tr><th>名称</th><th>天数</th><th>事件</th><th>操作</th></tr></thead>
                    <tbody id="godTimelineTableBody"></tbody></table>
                </div>
                <div class="god-create-timeline">
                    <input type="text" id="newTimelineName" placeholder="新时间线名称..." maxlength="50">
                    <button id="createTimelineBtn" class="btn btn-sm">+ 创建</button>
                </div>
            </div>
            <div class="god-section">
                <h3>📝 今日事件</h3>
                <p class="god-hint">每天只能编写一个事件，只能覆盖不能删除</p>
                <textarea id="todayEventInput" class="event-textarea" placeholder="编写今天发生的事件... (最多200字)" maxlength="200" rows="4"></textarea>
                <div class="event-char-count"><span id="eventCharCount">0</span>/200</div>
                <button id="saveEventBtn" class="btn btn-primary">💾 覆盖保存</button>
                <p class="god-hint" id="eventUpdateInfo"></p>
            </div>
            <div class="god-section">
                <h3>📜 历史事件 <span class="readonly-tag">只读</span></h3>
                <div class="event-history" id="eventHistory"><p class="god-hint">暂无事件记录</p></div>
            </div>
        </aside>
        <div class="god-backdrop" id="godBackdrop"></div>
    </div>

    <!-- 创建群聊对话框 -->
    <div class="modal-overlay" id="newGroupModal" style="display:none;">
        <div class="modal">
            <h3>👥 新建群聊</h3>
            <p>选择要加入群聊的 NPC：</p>
            <div class="checkbox-group" id="groupNpcCheckboxes"></div>
            <div class="modal-buttons">
                <button id="newGroupCancel" class="btn">取消</button>
                <button id="newGroupConfirm" class="btn btn-primary">创建并开始抢话</button>
            </div>
        </div>
    </div>

    <!-- 推进确认对话框 -->
    <div class="modal-overlay" id="advanceModal" style="display:none;">
        <div class="modal">
            <h3>⚡ 推进时间线</h3>
            <p>确定要推进到第 <strong id="advanceTargetDay">N</strong> 天吗？</p>
            <p class="modal-warning">⚠️ 此操作不可撤销</p>
            <div class="modal-buttons">
                <button id="advanceCancel" class="btn">取消</button>
                <button id="advanceConfirm" class="btn btn-primary">确定推进</button>
            </div>
        </div>
    </div>

    <script src="js/state.js?v=2"></script>
    <script src="js/api.js?v=2"></script>
    <script src="js/storage.js?v=2"></script>
    <script src="js/app.js?v=2"></script>
    <script src="js/god.js?v=2"></script>
</body>
</html>
